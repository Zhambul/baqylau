<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- maximum-scale=1 suppresses iPadOS Safari's ~1.3x auto-zoom on focusing a
     text control (user pinch-zoom still works — Safari has ignored max-scale
     for user gestures since iOS 10); interactive-widget=resizes-content makes
     the on-screen keyboard resize the layout instead of overlaying the
     composer; viewport-fit=cover pairs with the safe-area insets in the CSS -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<title>baqylau · dashboard</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="icon" id="favicon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath d='M1 8 Q8 1.5 15 8 Q8 14.5 1 8 Z' fill='none' stroke='%237d8590' stroke-width='1.6'/%3E%3Ccircle cx='8' cy='8' r='3.4' fill='%23c678dd'/%3E%3Ccircle cx='8' cy='8' r='1.5' fill='%231a0620'/%3E%3C/svg%3E">
</head>
<body>
<header id="top">
  <a class="brand" href="#/">◉ <b>baqylau</b><span class="dimtxt">/dashboard</span></a>
  <div class="topright">
    <button id="newbtn" class="ghost">+ session</button>
    <button id="notifbtn" class="ghost" hidden>enable notifications</button>
    <button id="fsbtn" class="ghost" title="fullscreen">⛶</button>
    <span id="conn" class="dot" data-on="0" title="event stream"></span>
  </div>
</header>
<div id="accounts" hidden></div>
<div id="attn" hidden></div>
<main id="view"></main>
<div id="modal" hidden></div>
<div id="toasts"></div>
<script src="/static/app.js"></script>
</body>
</html>
